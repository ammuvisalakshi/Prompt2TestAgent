name: Deploy Prompt2Test Agent to Bedrock AgentCore

on:
  push:
    branches: [master]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: prompt2test-agent
  AGENTCORE_AGENT_NAME: prompt2test-agent

jobs:
  deploy:
    name: Build → Push to ECR → Deploy to AgentCore
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ─────────────────────────────────
      # These secrets are set in GitHub → Settings → Secrets and variables → Actions
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Login to Amazon ECR ────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build Docker image ─────────────────────────────────────────
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

      # ── 5. Push to ECR ────────────────────────────────────────────────
      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      # ── 6. Deploy CDK stack (ECR repo + AgentCore resources) ──────────
      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Deploy
        working-directory: infra
        env:
          IMAGE_URI: ${{ env.IMAGE_URI }}
        run: |
          npx cdk deploy --require-approval never \
            --context imageUri=$IMAGE_URI

      # ── 7. Summary ────────────────────────────────────────────────────
      - name: Print deployment summary
        run: |
          echo "✅ Agent deployed successfully"
          echo "Image: $IMAGE_URI"
          echo "Agent: $AGENTCORE_AGENT_NAME"
